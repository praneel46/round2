<!DOCTYPE html>
<html>
<head>

<title>Debugging Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ACCESS PAGE -->

<div id="accessPage" class="card">

<h1 class="title">DEBUGGING CHALLENGE</h1>

<input type="password" id="accessCode" placeholder="Enter Access Code">

<button onclick="verifyAccess()">ENTER</button>

</div>



<!-- TEAM PAGE -->

<div id="teamPage" class="card hidden">

<h2>Enter Team Name</h2>

<input type="text" id="teamName" placeholder="Team Name">

<button onclick="startExam()">Start Contest</button>

</div>



<!-- CONTEST PAGE -->

<div id="examPage" class="hidden">

<div class="topbar">

<div id="teamDisplay"></div>

<div id="timer">60:00</div>

</div>



<div class="contestContainer">

<!-- QUESTION PANEL -->

<div class="questionPanel">

<h2 id="questionTitle"></h2>

<pre id="questionCode"></pre>

<div class="navButtons">

<button onclick="prevQuestion()">Previous</button>

<button onclick="nextQuestion()">Next</button>

</div>

<div id="submitArea">

<button onclick="submitExam()">Submit</button>

</div>

</div>


<!-- COMPILER PANEL -->

<div class="compilerPanel">

<iframe
src="https://www.programiz.com/cpp-programming/online-compiler/"
width="100%"
height="650"
frameborder="0">
</iframe>

</div>

</div>

</div>



<div id="successPage">

<h1>Submission Successful</h1>

</div>


<script src="script.js"></script>

</body>
</html>
