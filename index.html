<!DOCTYPE html>
<html>
<head>
<title>Debugging Challenge</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

</head>

<body>

<!-- ACCESS PAGE -->
<div id="accessPage" class="card">

<h1>Debugging Challenge</h1>

<input type="password" id="accessCode" placeholder="Access Code">

<button onclick="verifyAccess()">Enter</button>

</div>


<!-- TEAM PAGE -->
<div id="teamPage" class="card hidden">

<h2>Enter Team Name</h2>

<input type="text" id="teamName">

<button onclick="startContest()">Start</button>

</div>


<!-- CONTEST PAGE -->
<div id="contestPage" class="hidden">

<div class="topbar">

<div id="teamDisplay"></div>

<div id="timer">60:00</div>

</div>


<div class="main">

<!-- QUESTION SIDE -->
<div class="leftPanel">

<h2 id="qTitle"></h2>

<p id="qDesc"></p>

<pre id="qCode"></pre>

<div class="nav">

<button onclick="prevQ()">Previous</button>

<button onclick="nextQ()">Next</button>

<button onclick="saveCode()">Save</button>

</div>

<button id="submitBtn" onclick="submitContest()">Submit</button>

</div>


<!-- COMPILER SIDE -->
<div class="rightPanel">

<select id="language">

<option value="cpp">C++</option>

<option value="c">C</option>

<option value="python">Python</option>

</select>

<div id="editor"></div>

<button onclick="runCode()">Run Code</button>

<pre id="output"></pre>

</div>


</div>

</div>


<div id="successPage">

<h1>Submission Successful</h1>

</div>

<script src="script.js"></script>

</body>
</html>
