<!DOCTYPE html>
<html>
<head>
<title>Debugging Challenge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ACCESS CODE PAGE -->

<div id="accessPage" class="card">
<h1>Debugging Challenge</h1>

<input type="password" id="accessCode" placeholder="Enter Access Code">

<button onclick="verifyAccess()">Continue</button>

</div>


<!-- TEAM NAME PAGE -->

<div id="teamPage" class="card" style="display:none">

<h2>Enter Team Name</h2>

<input type="text" id="teamName" placeholder="Team Name">

<button onclick="startExam()">Start Challenge</button>

</div>


<!-- EXAM PAGE -->

<div id="examPage">

<div class="topbar">

<div id="teamDisplay"></div>

<div id="progress">Question 1 / 3</div>

<div id="timer">60:00</div>

</div>



<div class="questionBox">

<h2 id="questionTitle"></h2>

<pre id="questionCode"></pre>


<select id="language">
<option>C</option>
<option>C++</option>
<option>Python</option>
<option>Java</option>
</select>


<div class="editor-container">

<div id="lineNumbers"></div>

<textarea id="editor" spellcheck="false"></textarea>

</div>


<button onclick="toggleFullscreen()">Full Screen</button>

<button id="runBtn" onclick="runCode()">Run Code</button>

<div id="outputBox">Terminal output...</div>

</div>


<div class="navNumbers">

<button onclick="goToQuestion(0)">1</button>
<button onclick="goToQuestion(1)">2</button>
<button onclick="goToQuestion(2)">3</button>

</div>


<div class="navButtons">

<button onclick="prevQuestion()">Previous</button>

<button onclick="saveCode()">Save</button>

<button onclick="nextQuestion()">Next</button>

</div>


<div id="submitArea">

<button onclick="submitExam()">Submit</button>

</div>

</div>



<div id="successPage">

<h1>Submitted Successfully ✅</h1>

</div>

<script src="script.js"></script>

</body>
</html>
