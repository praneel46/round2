<!DOCTYPE html>
<html>
<head>

<title>Debugging Challenge</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

</head>

<body>

<div class="topbar">

<div id="teamDisplay">Team</div>
<div id="timer">60:00</div>

</div>


<div class="container">

<!-- LEFT QUESTION PANEL -->

<div class="questionPanel">

<h2 id="qTitle">Question Title</h2>

<p id="qDesc">
Question description will appear here.
</p>

<pre id="qCode">
Buggy code will appear here
</pre>

<div class="buttons">

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="saveCode()">Save</button>
<button onclick="submitContest()">Submit</button>

</div>

</div>


<!-- RIGHT COMPILER PANEL -->

<div class="compilerPanel">

<select id="language">
<option value="cpp">C++</option>
<option value="c">C</option>
<option value="python">Python</option>
</select>

<div id="editor"></div>

<button class="runBtn" onclick="runCode()">Run Code</button>

<pre id="output"></pre>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
